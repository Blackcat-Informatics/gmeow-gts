# Curated golangci-lint configuration for the Go GTS engine.
# Keep this deterministic: explicit linter list, pinned rules, no "default all".
version: "2"

linters:
  default: none
  enable:
    - errcheck
    - bodyclose
    - durationcheck
    - godoclint
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - nilerr
    - nolintlint
    - revive
    - staticcheck
    - unconvert

  # Evaluated during issue #142 but intentionally not enabled:
  # - contextcheck/noctx: current public APIs accept nil contexts and normalize
  #   to context.Background(); changing that needs an API/behavior decision.
  # - errorlint: flags existing tests and codec error assertions that should be
  #   cleaned up in a dedicated assertion-semantics pass.
  # - nilnil/makezero/whitespace: clean today, but less directly tied to the
  #   current safety and suppression goals than the enabled additions above.

  settings:
    revive:
      rules:
        - name: exported
          arguments:
            - "checkPrivateReceivers"
            - "sayRepetitiveInsteadOfStutters"
        - name: package-comments

    gosec:
      # G115 flags int->uint64 conversions. In go/gts these are bounded by
      # prior length checks (term ids are always < len(terms)) and the cost of
      # adding guards at every call site outweighs the safety value. Keep the
      # rule enabled elsewhere; annotate specific call sites if needed.
      excludes:
        - G115

  exclusions:
    rules:
      # G304 (file inclusion via variable) fires on tests that read the frozen
      # conformance corpus by a computed path. The inputs are repo-local test
      # vectors, not untrusted data; keep G304 active for non-test code.
      - path: _test\.go
        text: G304
        linters:
          - gosec

run:
  timeout: 5m
  modules-download-mode: readonly
