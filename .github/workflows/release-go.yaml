name: Release Go GTS

# On a go/v* tag, cross-build the gts CLI, attest provenance and SBOM evidence,
# and publish an immutable GitHub Release with the archives, checksums, and SBOM.

on:
  push:
    tags:
      - 'go/v*'

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
      id-token: write # provenance attestation
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v5
        with:
          go-version-file: go/go.mod
          # No build cache on the publish path: a tag-triggered release must not
          # consume a cache a PR could have poisoned (zizmor cache-poisoning).
          cache: false

      - name: Cross-build the gts CLI
        run: |
          VERSION="${GITHUB_REF_NAME#go/v}"
          rm -rf dist
          mkdir -p dist
          cd go
          for os in linux darwin windows; do
            for arch in amd64 arm64; do
              ext=""
              [ "$os" = windows ] && ext=".exe"
              CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
                go build -trimpath -ldflags "-s -w" -o "gts$ext" ./cmd/gts
              base="gts_${VERSION}_${os}_${arch}"
              if [ "$os" = windows ]; then
                zip -qj "../dist/${base}.zip" "gts$ext"
              else
                tar czf "../dist/${base}.tar.gz" "gts$ext"
              fi
              rm -f "gts$ext"
            done
          done
          cd ../dist && sha256sum ./* > checksums.txt
          ls -la

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: go
          format: spdx-json
          output-file: dist/sbom-go-gts.spdx.json
          upload-artifact: false

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
            dist/sbom-go-gts.spdx.json

      - name: Attest SBOM for release archives
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
          sbom-path: dist/sbom-go-gts.spdx.json

      - name: Write release notes
        run: |
          VERSION="${GITHUB_REF_NAME#go/v}"
          cat > release-notes-go.md <<EOF
          GTS Go v${VERSION} release for \`go.blackcatinformatics.ca/gts\`.
          EOF

          if [ "$VERSION" = "0.9.5" ]; then
            cat >> release-notes-go.md <<EOF

          This is the Go 0.9.5 parity release. It publishes the Go engine and CLI
          from \`Blackcat-Informatics/gmeow-gts\`, including the Go RDF event
          source/sink API, XSD lexical validation diagnostics, and RDF 1.2 text
          codec API/CLI parity surface completed for this release.
          EOF
          else
            cat >> release-notes-go.md <<EOF

          This release publishes the Go engine and CLI from
          \`Blackcat-Informatics/gmeow-gts\`.
          EOF
          fi

          cat >> release-notes-go.md <<EOF

          Pre-built \`gts\` CLI binaries are attached for Linux, macOS, and Windows.

          Verify the immutable GitHub release attestation:
          \`\`\`
          gh release verify "$GITHUB_REF_NAME" --repo $GITHUB_REPOSITORY
          \`\`\`

          Verify build provenance for a downloaded archive:
          \`\`\`
          gh attestation verify <archive> --repo $GITHUB_REPOSITORY
          \`\`\`
          EOF

      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release_draft_state="$(
            gh release view "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --json isDraft \
              --jq '.isDraft' 2>/dev/null || true
          )"
          case "$release_draft_state" in
            true)
              echo "Draft release $GITHUB_REF_NAME already exists; reusing it"
              ;;
            false)
              echo "Release $GITHUB_REF_NAME already exists and is published"
              exit 1
              ;;
            *)
              gh release create "$GITHUB_REF_NAME" \
                --repo "$GITHUB_REPOSITORY" \
                --verify-tag \
                --draft \
                --title "GTS Go v${GITHUB_REF_NAME#go/v}" \
                --notes-file release-notes-go.md
              ;;
          esac

      - name: Upload release assets before publication
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          assets=(dist/*)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found in dist/"
            exit 1
          fi
          gh release upload "$GITHUB_REF_NAME" "${assets[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
          printf '%s\n' "${assets[@]##*/}" | sort > expected-assets.txt
          gh release view "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --json assets \
            --jq '.assets[].name' | sort > uploaded-assets.txt
          diff -u expected-assets.txt uploaded-assets.txt

      - name: Publish immutable GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --draft=false

      - name: Assert release is immutable
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --json isImmutable \
            --jq '.isImmutable' | grep -qx true
