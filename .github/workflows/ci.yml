name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55 # v5.5.0
        with:
          python-version: "3.13"

      - name: Cache pre-commit hook environments
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - name: Pre-commit (format, spelling, YAML/MD/shell/actions, secrets)
        run: pipx run pre-commit run --all-files --show-diff-on-failure

  # Rust engine: pure stable Rust, gates against the frozen corpus in vectors/.
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: rust

      - name: Format gate
        working-directory: rust
        run: cargo fmt --check

      - name: Clippy (warnings are errors)
        working-directory: rust
        run: cargo clippy --all-targets -- -D warnings

      - name: Conformance corpus + CLI tests
        working-directory: rust
        run: cargo test

  # Go engine: gates against the same frozen corpus and CLI surface.
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Build (no CGO)
        working-directory: go
        run: CGO_ENABLED=0 go build ./...

      - name: Vet
        working-directory: go
        run: go vet ./...

      - name: staticcheck
        uses: dominikh/staticcheck-action@672a31696676d1592844bf0164b3bbfd855a4d50 # v1.4.1
        with:
          version: "2026.1"
          install-go: false
          working-directory: go

      - name: golangci-lint
        uses: golangci/golangci-lint-action@db582008a42febd596419635a5abc9d9815daa9c # v9.2.1
        with:
          version: v2.12.2
          working-directory: go
          args: --timeout=5m

      - name: Conformance corpus + CLI tests (no CGO)
        working-directory: go
        run: CGO_ENABLED=0 go test ./...

  # TypeScript engine: lint, test (compiles + runs against vectors/), and build.
  ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: ts/package.json

      - name: Install dependencies
        working-directory: ts
        run: npm ci

      - name: Lint
        working-directory: ts
        run: npm run lint

      - name: Conformance corpus + CLI tests
        working-directory: ts
        run: npm test

      - name: Build package
        working-directory: ts
        run: npm run build

  # Python reference engine + the conformance oracle (defines the corpus).
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Sync environment
        working-directory: python
        run: uv sync --extra rdf

      - name: Lint (ruff)
        working-directory: python
        run: uv run ruff check .

      - name: Type-check (mypy)
        working-directory: python
        run: uv run mypy

      - name: Conformance + unit tests
        working-directory: python
        run: uv run pytest

      - name: Corpus is reproducible from the oracle
        working-directory: python
        run: |
          uv run python scripts/gen_vectors.py
          git diff --exit-code ../vectors
