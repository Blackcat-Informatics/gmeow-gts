name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Engine versions agree (lockstep release)
        run: bash scripts/check-versions.sh

      - name: Repository contracts
        run: |
          python scripts/check_cli_parity.py
          python scripts/check_advanced_contract.py
          python scripts/check_ecosystem_contract.py
          python scripts/check_security_contract.py
          python scripts/check_crypto_deferrals.py
          python scripts/check_vector_manifest.py
          python scripts/check_vector_manifest.py --self-test

      - name: Cache pre-commit hook environments
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - name: Pre-commit (format, spelling, YAML/MD/shell/actions, secrets, REUSE)
        run: pipx run pre-commit run --all-files --show-diff-on-failure

  # Rust engine: build + test on every OS; format/clippy/wasm once on Linux.
  rust:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            rust
            rust/capi
            visual-hashing

      - name: Format gate
        if: runner.os == 'Linux'
        run: |
          cargo fmt --manifest-path visual-hashing/Cargo.toml --check
          cargo fmt --manifest-path rust/Cargo.toml --check
          cargo fmt --manifest-path rust/capi/Cargo.toml --check

      - name: Clippy (warnings are errors)
        if: runner.os == 'Linux'
        run: |
          cargo clippy --manifest-path visual-hashing/Cargo.toml --all-targets -- -D warnings
          cargo clippy --manifest-path rust/Cargo.toml --all-targets -- -D warnings
          cargo clippy --manifest-path rust/Cargo.toml --all-targets --features duckdb -- -D warnings
          cargo clippy --manifest-path rust/Cargo.toml --all-targets --features rdf -- -D warnings
          cargo clippy --manifest-path rust/Cargo.toml --all-targets --features sophia-adapter -- -D warnings
          cargo clippy --manifest-path rust/Cargo.toml --all-targets --features tar -- -D warnings
          cargo clippy --manifest-path rust/Cargo.toml --all-targets --features yaml-ld -- -D warnings
          cargo clippy --manifest-path rust/capi/Cargo.toml --all-targets -- -D warnings

      - name: Rustdoc (warnings are errors)
        if: runner.os == 'Linux'
        env:
          RUSTDOCFLAGS: -D warnings
        run: |
          cargo doc --manifest-path visual-hashing/Cargo.toml --no-deps
          cargo doc --manifest-path rust/Cargo.toml --no-deps
          cargo doc --manifest-path rust/Cargo.toml --no-deps --features yaml-ld
          cargo doc --manifest-path rust/capi/Cargo.toml --no-deps

      - name: Conformance corpus + CLI tests
        run: |
          cargo test --manifest-path visual-hashing/Cargo.toml
          cargo test --manifest-path rust/Cargo.toml --no-default-features
          cargo test --manifest-path rust/Cargo.toml
          cargo test --manifest-path rust/Cargo.toml --features duckdb
          cargo test --manifest-path rust/Cargo.toml --features rdf
          cargo test --manifest-path rust/Cargo.toml --features sophia-adapter
          cargo test --manifest-path rust/Cargo.toml --features tar
          cargo test --manifest-path rust/Cargo.toml --features yaml-ld
          cargo test --manifest-path rust/capi/Cargo.toml

      - name: C ABI smoke test
        if: runner.os == 'Linux'
        run: bash rust/capi/scripts/smoke.sh

      - name: C++ C ABI wrapper smoke test
        if: runner.os == 'Linux'
        run: bash cpp/scripts/smoke.sh

      - name: .NET C ABI wrapper smoke test
        if: runner.os == 'Linux'
        run: bash dotnet/scripts/smoke.sh

      - name: Library builds for wasm32 (wasm-friendly claim)
        if: runner.os == 'Linux'
        run: |
          cargo build --manifest-path visual-hashing/Cargo.toml --lib --target wasm32-unknown-unknown
          cargo build --manifest-path rust/Cargo.toml --lib --target wasm32-unknown-unknown

  # Downstream Rust API contract: ontology validator compiles against this crate.
  downstream-gmeow-ontology:
    name: downstream gmeow-ontology Rust API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gmeow-gts
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: gmeow-gts
          persist-credentials: false

      - name: Checkout gmeow-ontology
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: Blackcat-Informatics/gmeow-ontology
          path: gmeow-ontology
          persist-credentials: false

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            gmeow-gts/rust
            gmeow-gts/visual-hashing
            gmeow-ontology

      - name: Patch downstream dependency to this checkout
        working-directory: gmeow-ontology
        run: |
          set -euo pipefail
          printf '\n[patch.crates-io]\ngmeow-gts = { path = "../gmeow-gts/rust" }\n' >> Cargo.toml

      - name: Check gmeow-validate against current gmeow-gts
        working-directory: gmeow-ontology
        run: cargo check -p gmeow-validate

  # Go engine: build + test on every OS; staticcheck/golangci once on Linux.
  go:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Build
        working-directory: go
        run: go build ./...

      - name: Vet
        working-directory: go
        run: go vet ./...

      - name: staticcheck
        if: runner.os == 'Linux'
        uses: dominikh/staticcheck-action@672a31696676d1592844bf0164b3bbfd855a4d50 # v1.4.1
        with:
          version: "2026.1"
          install-go: false
          working-directory: go

      - name: golangci-lint
        if: runner.os == 'Linux'
        uses: golangci/golangci-lint-action@db582008a42febd596419635a5abc9d9815daa9c # v9.2.1
        with:
          version: v2.12.2
          working-directory: go
          args: --timeout=5m

      - name: Conformance corpus + CLI tests
        working-directory: go
        run: go test ./...

  # TypeScript engine: build + test on every OS; lint once on Linux.
  ts:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ts/package.json

      - name: Install dependencies
        working-directory: ts
        run: npm ci

      - name: Lint
        if: runner.os == 'Linux'
        working-directory: ts
        run: npm run lint

      - name: Conformance corpus + CLI tests
        working-directory: ts
        run: npm test

      - name: Build package
        working-directory: ts
        run: npm run build

  # Python reference engine: build + test on every OS; lint/types/corpus once on Linux.
  python:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Sync environment
        working-directory: python
        run: uv sync --extra rdf

      - name: Lint (ruff)
        if: runner.os == 'Linux'
        working-directory: python
        run: uv run ruff check .

      - name: Type-check (mypy)
        if: runner.os == 'Linux'
        working-directory: python
        run: uv run mypy

      - name: Conformance + unit tests
        working-directory: python
        run: uv run pytest

      - name: Corpus is reproducible from the oracle
        if: runner.os == 'Linux'
        working-directory: python
        run: |
          uv run python scripts/gen_vectors.py
          git diff --exit-code ../vectors

  # Smalltalk/Pharo parity engine: pinned runtime, SUnit conformance, and CLI support.
  smalltalk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Build pinned Pharo runtime
        run: docker build -t gmeow-gts-smalltalk smalltalk

      - name: SUnit conformance and CLI parity tests
        run: |
          docker run --rm -v "${{ github.workspace }}:/workspace" \
            --entrypoint /bin/sh gmeow-gts-smalltalk -lc \
            "sh /workspace/smalltalk/scripts/run-tests.sh"

  # Kotlin/JVM parity engine: Gradle build, tests, detekt, and CLI install smoke.
  kotlin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Gradle tests and detekt
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp \
            -e GRADLE_USER_HOME=/tmp/gradle \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace/kotlin \
            gradle:jdk21 gradle test detekt installDist --no-daemon

      - name: CLI smoke
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace/kotlin \
            gradle:jdk21 /workspace/kotlin/build/install/gmeow-gts-kotlin/bin/gmeow-gts-kotlin \
            fold /workspace/vectors/01-minimal.gts

  # Live cross-engine interoperability: each engine reads every other's output.
  interop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: rust

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ts/package.json

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Cross-engine interop
        run: bash scripts/interop.sh
