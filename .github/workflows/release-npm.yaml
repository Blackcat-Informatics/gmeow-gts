name: Release npm gmeow-gts

# On an npm-v* tag, verify and publish the @blackcatinformatics/gmeow-gts
# package to the npm registry.

on:
  push:
    tags:
      - 'npm-v*'

concurrency:
  group: release-npm-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Validate tag matches package version
        working-directory: ts
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#npm-v}"
          PKG_VERSION="$(node -p 'require("./package.json").version')"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: ts/package.json
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        working-directory: ts
        run: npm ci

      - name: Run tests
        working-directory: ts
        run: npm test

      - name: Build package
        working-directory: ts
        run: npm run build

      - name: Publish to npm
        working-directory: ts
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
