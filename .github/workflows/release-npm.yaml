name: Release npm gmeow-gts

# On an npm-v* tag, verify and publish the @blackcatinformatics/gmeow-gts
# package to the npm registry via npm trusted publishing (OIDC) — no NPM_TOKEN.
# Requires a Trusted Publisher configured on npmjs.com for this package:
#   Publisher: GitHub Actions · Owner: Blackcat-Informatics · Repo: gmeow-gts
#   Workflow: release-npm.yaml · Environment: (none)

on:
  push:
    tags:
      - 'npm-v*'

concurrency:
  group: release-npm-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Validate tag matches package version
        working-directory: ts
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#npm-v}"
          PKG_VERSION="$(node -p 'require("./package.json").version')"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: ts/package.json
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm (trusted publishing needs npm >= 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        working-directory: ts
        run: npm ci

      - name: Run tests
        working-directory: ts
        run: npm test

      - name: Build package
        working-directory: ts
        run: npm run build

      - name: Pack the tarball (for attestation + SBOM)
        working-directory: ts
        run: npm pack

      - name: Attest build provenance for the tarball
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v2.2.3
        with:
          subject-path: ts/*.tgz

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: ts
          format: spdx-json
          output-file: sbom-npm-gmeow-gts.spdx.json
          upload-artifact: false

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sbom-npm-gmeow-gts
          path: sbom-npm-gmeow-gts.spdx.json

      - name: Publish to npm (trusted publishing / OIDC)
        working-directory: ts
        # No NODE_AUTH_TOKEN: npm authenticates via the GitHub OIDC token and the
        # configured Trusted Publisher; npm's own sigstore provenance is generated
        # automatically (in addition to the GitHub attestation above).
        run: npm publish --access public
