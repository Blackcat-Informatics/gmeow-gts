name: Benchmarks

on:
  workflow_dispatch:
    inputs:
      engines:
        description: "Comma-separated engines to benchmark."
        required: true
        default: "rust,python,go,ts"
      iterations:
        description: "Iterations per CLI benchmark command."
        required: true
        default: "3"
      vectors:
        description: "Comma-separated GTS vectors for read/fold benchmarks."
        required: true
        default: "vectors/01-minimal.gts,vectors/23-files-profile-tree.gts,vectors/25b-streamable-compacted.gts"

permissions:
  contents: read

jobs:
  release-benchmarks:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55 # v5.5.0
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: ts/package.json

      - name: Run benchmark suite
        env:
          BENCH_ENGINES: ${{ inputs.engines }}
          BENCH_ITERATIONS: ${{ inputs.iterations }}
          BENCH_VECTORS: ${{ inputs.vectors }}
        run: |
          python scripts/bench_release_suite.py \
            --engines "$BENCH_ENGINES" \
            --iterations "$BENCH_ITERATIONS" \
            --vectors "$BENCH_VECTORS" \
            --out-dir dist/benchmarks/manual

      - name: Upload benchmark report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: gts-release-benchmark-report
          path: dist/benchmarks/manual/
