name: Release Cargo gmeow-gts

# On a rust-v* tag, verify, attest, and publish the gmeow-gts crate to crates.io
# via crates.io Trusted Publishing (GitHub Actions OIDC) -- no repository token.
# Requires a Trusted Publisher configured on crates.io for this crate:
#   Publisher: GitHub Actions · Owner: Blackcat-Informatics · Repo: gmeow-gts
#   Workflow: release-cargo.yaml · Environment: (none)
#
# NOTE: gmeow-gts depends on the `visual-hashing` crate, so a matching
# visual-hashing version must already be published from
# Blackcat-Informatics/visual-hashing before this workflow can publish.

on:
  push:
    tags:
      - 'rust-v*'

concurrency:
  group: release-cargo-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Verify tag matches crate version
        working-directory: rust
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#rust-v}"
          PKG_VERSION="$(cargo metadata --no-deps --format-version 1 | python3 -c 'import json,sys; print(json.load(sys.stdin)["packages"][0]["version"])')"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match Cargo.toml version $PKG_VERSION"
            exit 1
          fi

      - name: Verify package builds and tests
        working-directory: rust
        run: cargo test --locked

      - name: Package the crate
        working-directory: rust
        run: cargo package --locked

      - name: Attest build provenance for the crate
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: rust/target/package/*.crate

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: rust
          format: spdx-json
          output-file: sbom-rust-gmeow-gts.spdx.json
          upload-artifact: false

      - name: Attest SBOM for crate
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: rust/target/package/*.crate
          sbom-path: sbom-rust-gmeow-gts.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sbom-rust-gmeow-gts
          path: sbom-rust-gmeow-gts.spdx.json

      - name: Authenticate to crates.io (trusted publishing / OIDC)
        id: auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5

      - name: Publish to crates.io
        working-directory: rust
        # cargo publish expects CARGO_REGISTRY_TOKEN; this value is the
        # short-lived Trusted Publishing token from crates.io, not a repo secret.
        run: cargo publish --locked --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
