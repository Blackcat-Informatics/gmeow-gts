name: Release Cargo gmeow-gts

# On a rust-v* tag, verify and publish the gmeow-gts crate to crates.io.

on:
  push:
    tags:
      - 'rust-v*'

concurrency:
  group: release-cargo-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Verify tag matches crate version
        working-directory: rust
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#rust-v}"
          PKG_VERSION="$(cargo metadata --no-deps --format-version 1 | python3 -c 'import json,sys; print(json.load(sys.stdin)["packages"][0]["version"])')"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match Cargo.toml version $PKG_VERSION"
            exit 1
          fi

      - name: Verify package builds and tests
        working-directory: rust
        run: cargo test

      - name: Publish to crates.io
        working-directory: rust
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
