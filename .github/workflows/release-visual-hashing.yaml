name: Release Cargo visual-hashing

# On a visual-hashing-v* tag, verify, attest, and publish the visual-hashing
# crate to crates.io using the CARGO_REGISTRY_TOKEN repository secret.
#
# Publish ORDER: publish visual-hashing before a gmeow-gts release that bumps the
# required version, since the gmeow-gts crate depends on it.

on:
  push:
    tags:
      - 'visual-hashing-v*'

concurrency:
  group: release-visual-hashing-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Verify tag matches crate version
        working-directory: visual-hashing
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#visual-hashing-v}"
          PKG_VERSION="$(cargo metadata --no-deps --format-version 1 | python3 -c 'import json,sys; print(json.load(sys.stdin)["packages"][0]["version"])')"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match Cargo.toml version $PKG_VERSION"
            exit 1
          fi

      - name: Verify package builds and tests
        working-directory: visual-hashing
        run: cargo test --locked

      - name: Package the crate
        working-directory: visual-hashing
        run: cargo package --locked

      - name: Attest build provenance for the crate
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v2.2.3
        with:
          subject-path: visual-hashing/target/package/*.crate

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: visual-hashing
          format: spdx-json
          output-file: sbom-visual-hashing.spdx.json
          upload-artifact: false

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sbom-visual-hashing
          path: sbom-visual-hashing.spdx.json

      - name: Publish to crates.io
        working-directory: visual-hashing
        run: cargo publish --locked --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
