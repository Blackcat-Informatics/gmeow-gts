name: Verify published release

permissions:
  contents: read
  attestations: read

on:
  workflow_dispatch:
    inputs:
      version:
        description: GTS package version to verify, such as 0.9.0.
        required: true
        type: string
      visual_hashing_version:
        description: visual-hashing crate version to verify.
        required: true
        default: "0.1.1"
        type: string
      allow_legacy_release_gaps:
        description: Downgrade known pre-hardening gaps to warnings.
        required: true
        default: false
        type: boolean

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55 # v5.5.0
        with:
          python-version: "3.13"

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: Install verification CLIs
        run: |
          python -m pip install --upgrade pypi-attestations
          npm install -g npm@latest

      - name: Verify release family
        env:
          GH_TOKEN: ${{ github.token }}
          VERIFY_ALLOW_LEGACY_RELEASE_GAPS: ${{ inputs.allow_legacy_release_gaps }}
          VERIFY_VERSION: ${{ inputs.version }}
          VERIFY_VISUAL_HASHING_VERSION: ${{ inputs.visual_hashing_version }}
        run: |
          args=(
            --version "${VERIFY_VERSION}"
            --visual-hashing-version "${VERIFY_VISUAL_HASHING_VERSION}"
          )
          if [ "${VERIFY_ALLOW_LEGACY_RELEASE_GAPS}" = "true" ]; then
            args+=(--allow-legacy-release-gaps)
          fi
          python scripts/verify_release.py "${args[@]}"

      - name: Upload verification summary
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-verification-${{ inputs.version }}
          path: dist/release-verification/${{ inputs.version }}/
