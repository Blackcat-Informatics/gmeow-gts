# yamllint configuration. Relaxed where GitHub-Actions/issue-template idioms
# would otherwise trip the defaults (the `on:` key, long description lines).
extends: default

rules:
  document-start: disable
  line-length:
    max: 120
    level: warning
    allow-non-breakable-words: true
  comments:
    min-spaces-from-content: 1
  truthy:
    # GitHub Actions workflows use `on:` as a key — don't flag it.
    check-keys: false

ignore: |
  .venv/
  dist/
  node_modules/
  ts/package-lock.json
